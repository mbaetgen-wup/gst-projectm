<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Background radial gradient: deep space -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>

    <!-- Ripple gradient: hot pink to cyan -->
    <radialGradient id="ripple" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#ff2d7b" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#a83279" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#3b82c4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Central glow -->
    <radialGradient id="glow" cx="50%" cy="46%" r="20%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ff6eb4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff2d7b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Outer ripple rings — concentric ellipses suggesting fluid impact -->
  <ellipse cx="128" cy="124" rx="105" ry="98" fill="none"
           stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.2"/>
  <ellipse cx="128" cy="124" rx="88" ry="82" fill="none"
           stroke="#3b9fc9" stroke-width="1.8" stroke-opacity="0.3"/>
  <ellipse cx="128" cy="124" rx="70" ry="65" fill="none"
           stroke="#7b5ea7" stroke-width="2.2" stroke-opacity="0.45"/>
  <ellipse cx="128" cy="124" rx="52" ry="48" fill="none"
           stroke="#c43a7b" stroke-width="2.8" stroke-opacity="0.6"/>
  <ellipse cx="128" cy="124" rx="34" ry="31" fill="none"
           stroke="#ff2d7b" stroke-width="3.2" stroke-opacity="0.8"/>

  <!-- Ripple fill glow -->
  <ellipse cx="128" cy="124" rx="100" ry="93" fill="url(#ripple)" opacity="0.5"/>

  <!-- Central bright glow at impact point -->
  <ellipse cx="128" cy="120" rx="40" ry="37" fill="url(#glow)"/>

  <!-- "gst-pM" text mark -->
  <text x="128" y="210" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" letter-spacing="-0.5"
        fill="#ffffff" fill-opacity="0.85" text-anchor="middle">gst-pM</text>

  <!-- Subtle outer vignette -->
  <rect width="256" height="256" rx="48" fill="none"
        stroke="#0a0a14" stroke-width="8" stroke-opacity="0.3"/>
</svg>
